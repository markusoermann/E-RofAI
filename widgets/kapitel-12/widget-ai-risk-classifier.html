<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Act Risk Classifier</title>
<style>
  body{margin:0;padding:20px;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#333;box-sizing:border-box;}
  .container{max-width:820px;margin:0 auto;}
  .lead{font-size:.95rem;margin:0 0 14px;color:#555;}
  .cases{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .cases button{background:#eee;color:#333;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;transition:.15s;text-align:left;}
  .cases button:hover{background:#e0e0e0;}
  .cases button.active{background:#ff6a00;color:#fff;}
  .result{border:1px solid #e3e3e3;border-radius:8px;background:#fff;overflow:hidden;opacity:0;transition:opacity .2s;}
  .result.show{opacity:1;}
  .banner{padding:12px 16px;color:#fff;font-weight:700;font-size:1.05rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;}
  .banner .lvl{font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600;opacity:.9;}
  .lvl-prohibited{background:#b21f1f;}
  .lvl-high{background:#d35400;}
  .lvl-limited{background:#b8860b;}
  .lvl-minimal{background:#1a8a3c;}
  .body{padding:14px 16px;}
  .casename{font-size:.95rem;font-weight:600;margin:0 0 10px;color:#222;}
  .body h4{margin:12px 0 4px;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;color:#999;}
  .body ul{margin:0;padding-left:18px;}
  .body li{font-size:.85rem;line-height:1.5;margin-bottom:3px;color:#444;}
  .norm{display:inline-block;margin-top:10px;font-size:.78rem;color:#ff6a00;font-weight:600;background:#fff7f0;border:1px solid #ffd9b8;border-radius:4px;padding:3px 8px;}
  .pyramid{display:flex;gap:6px;margin:0 0 16px;}
  .pyramid span{flex:1;text-align:center;font-size:.68rem;font-weight:600;color:#fff;padding:5px 2px;border-radius:4px;opacity:.45;transition:.15s;}
  .pyramid span.on{opacity:1;}
</style>
</head>
<body>
<div class="container">
  <p class="lead">Pick an AI use case. The classifier assigns it to a risk tier of the EU AI Act and names the central obligations and consequences.</p>
  <div class="pyramid">
    <span class="lvl-prohibited" data-l="prohibited">Prohibited</span>
    <span class="lvl-high" data-l="high">High-risk</span>
    <span class="lvl-limited" data-l="limited">Limited</span>
    <span class="lvl-minimal" data-l="minimal">Minimal</span>
  </div>
  <div class="cases" id="cases"></div>
  <div class="result" id="result">
    <div class="banner" id="banner"><span id="bannertext"></span><span class="lvl" id="bannerlvl"></span></div>
    <div class="body">
      <p class="casename" id="casename"></p>
      <h4>Central obligations / consequences</h4>
      <ul id="duties"></ul>
      <span class="norm" id="norm"></span>
    </div>
  </div>
</div>
<script>
const C=[
 {label:"Social scoring by public authorities",
  name:"A public authority rates citizens on their behaviour across many areas of life and attaches advantages or disadvantages to the score.",
  level:"prohibited",banner:"Prohibited practice",
  duties:["Placing on the market, putting into service and use are banned.","No authorisation or exemption route.","Fine of up to EUR 35 million or 7% of worldwide annual turnover."],
  norm:"Art. 5(1)(c) AI Act"},
 {label:"Real-time remote biometric identification",
  name:"Live facial recognition in public spaces for law-enforcement purposes.",
  level:"prohibited",banner:"Prohibited in principle",
  duties:["Banned in publicly accessible spaces for law-enforcement purposes.","Only narrow exceptions subject to prior authorisation (e.g. search for a missing person, averting a terrorist threat).","Outside the exceptions it is regulated as a high-risk system."],
  norm:"Art. 5(1)(h), (2)-(5) AI Act"},
 {label:"Emotion recognition at the workplace",
  name:"Software analyses the emotions of employees during work.",
  level:"prohibited",banner:"Prohibited practice",
  duties:["Emotion recognition in the workplace and in education is banned.","Narrow exceptions only for medical or safety purposes.","Fine of up to EUR 35 million or 7%."],
  norm:"Art. 5(1)(f) AI Act"},
 {label:"CV screening in recruitment",
  name:"An AI pre-sorts and ranks job applications for a hiring process.",
  level:"high",banner:"High-risk AI system",
  duties:["Intended purpose listed in Annex III (employment).","Obligations include: risk management (Art. 9), data governance (Art. 10), technical documentation, human oversight (Art. 14).","Conformity assessment + CE marking + EU database entry before market placement.","Deployer: use as instructed, keep logs, possibly a fundamental-rights impact assessment."],
  norm:"Art. 6(2) with Annex III, Art. 8-15 AI Act"},
 {label:"Credit scoring",
  name:"A scoring system co-decides whether a consumer is granted a loan.",
  level:"high",banner:"High-risk AI system",
  duties:["Essential private service listed in Annex III.","Full catalogue of Art. 8-15 obligations (risk management, data governance, transparency, oversight).","Corrective Art. 6(3): only not high-risk if the system does not materially influence the decision, and that assessment must be documented."],
  norm:"Art. 6(2), Annex III No. 5 AI Act"},
 {label:"Customer-service chatbot",
  name:"An AI chatbot answers customer queries in dialogue.",
  level:"limited",banner:"Limited risk",
  duties:["Transparency duty: users must be able to tell they are interacting with an AI.","Synthetic content must be marked in a machine-readable way (watermarking).","No conformity assessment, but disclosure obligations."],
  norm:"Art. 50(1), (2) AI Act"},
 {label:"Deepfake generator",
  name:"A system produces deceptively real but artificial image or video content.",
  level:"limited",banner:"Limited risk",
  duties:["Deployers must label deepfakes as artificially generated.","For text on matters of public interest: disclose the AI creation.","Transparency instead of a ban, the content itself remains permitted."],
  norm:"Art. 50(4) AI Act"},
 {label:"Spam filter",
  name:"An AI-based filter sorts out unwanted e-mail.",
  level:"minimal",banner:"Minimal risk",
  duties:["No specific obligations under the AI Act.","Voluntary codes of conduct possible.","Cross-cutting duty: sufficient AI literacy of staff (Art. 4)."],
  norm:"no separate catalogue of obligations · Art. 4 AI Act"}
];
const cc=document.getElementById('cases');
C.forEach((c,i)=>{const b=document.createElement('button');b.textContent=c.label;b.onclick=()=>pick(i);cc.appendChild(b);});
const pyr=[...document.querySelectorAll('.pyramid span')];
function pick(i){
 [...cc.children].forEach((b,j)=>b.classList.toggle('active',j===i));
 const c=C[i];
 const r=document.getElementById('result');r.classList.add('show');
 const banner=document.getElementById('banner');
 banner.className='banner lvl-'+c.level;
 document.getElementById('bannertext').textContent=c.banner;
 document.getElementById('bannerlvl').textContent=c.level;
 document.getElementById('casename').textContent=c.name;
 const ul=document.getElementById('duties');ul.innerHTML='';
 c.duties.forEach(d=>{const li=document.createElement('li');li.textContent=d;ul.appendChild(li);});
 document.getElementById('norm').textContent=c.norm;
 pyr.forEach(s=>s.classList.toggle('on',s.dataset.l===c.level));
}
pick(0);
</script>
<script>
(function () {
  var lastH = 0;
  function reportHeight() {
    var h = document.body.scrollHeight;
    if (h === lastH) return;
    lastH = h;
    window.parent.postMessage({ iframeHeight: h }, '*');
  }
  window.addEventListener('load', function() { setTimeout(reportHeight, 100); });
  if (window.ResizeObserver) {
    new ResizeObserver(reportHeight).observe(document.body);
  }
  if (window.MutationObserver) {
    new MutationObserver(function() { setTimeout(reportHeight, 400); })
      .observe(document.body, { attributes: true, childList: true, subtree: true,
                                attributeFilter: ['class', 'style'] });
  }
})();
</script>
</body>
</html>
