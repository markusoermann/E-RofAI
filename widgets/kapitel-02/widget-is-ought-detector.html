<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Is/Ought Detector</title>
<style>
  body{margin:0;padding:20px;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#333;box-sizing:border-box;}
  .container{max-width:820px;margin:0 auto;}
  .lead{font-size:.95rem;margin:0 0 14px;color:#555;}
  .progress{font-size:.75rem;color:#999;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:0 0 8px;}
  .card{border:1px solid #e3e3e3;border-radius:8px;background:#fff;overflow:hidden;}
  .statement{padding:18px 18px 14px;font-size:1.05rem;line-height:1.5;color:#222;font-weight:600;}
  .prompt{padding:0 18px;font-size:.82rem;color:#777;margin:0 0 12px;}
  .choices{display:flex;flex-wrap:wrap;gap:8px;padding:0 18px 16px;}
  .choices button{flex:1;min-width:160px;background:#eee;color:#333;border:none;padding:11px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;transition:.15s;}
  .choices button:hover:not(:disabled){background:#e0e0e0;}
  .choices button:disabled{cursor:default;}
  .choices button.correct{background:#1a8a3c;color:#fff;}
  .choices button.wrong{background:#b21f1f;color:#fff;}
  .feedback{border-top:1px solid #eee;padding:14px 18px;font-size:.85rem;line-height:1.55;color:#444;display:none;}
  .feedback.show{display:block;}
  .feedback .tag{display:inline-block;font-size:.72rem;text-transform:uppercase;letter-spacing:.05em;font-weight:700;padding:3px 8px;border-radius:4px;color:#fff;margin-bottom:8px;}
  .tag-is{background:#2b6cb0;}
  .tag-ought{background:#805ad5;}
  .tag-fallacy{background:#d35400;}
  .hume{display:inline-block;margin-top:10px;font-size:.78rem;color:#ff6a00;font-weight:600;background:#fff7f0;border:1px solid #ffd9b8;border-radius:4px;padding:3px 8px;}
  .nav{margin-top:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;}
  .next{background:#ff6a00;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;transition:.15s;}
  .next:hover{background:#e85f00;}
  .next:disabled{background:#f0c9a8;cursor:default;}
  .score{font-size:.82rem;color:#777;font-weight:600;}
  .done{padding:18px;text-align:center;font-size:.95rem;color:#222;}
  .done .again{margin-top:12px;}
</style>
</head>
<body>
<div class="container">
  <p class="lead">Judge each statement. Is it a plain description of what <em>is</em> the case, a normative claim about what <em>ought</em> to be, or a fallacious leap that derives an "ought" from an "is" without stating the value premise?</p>
  <p class="progress" id="progress"></p>
  <div class="card">
    <div class="statement" id="statement"></div>
    <p class="prompt">How should this statement be classified?</p>
    <div class="choices">
      <button data-c="is" id="b-is">Descriptive (is)</button>
      <button data-c="ought" id="b-ought">Normative (ought)</button>
      <button data-c="fallacy" id="b-fallacy">Is/ought leap</button>
    </div>
    <div class="feedback" id="feedback"></div>
  </div>
  <div class="nav">
    <span class="score" id="score"></span>
    <button class="next" id="next" disabled>Next statement</button>
  </div>
</div>
<script>
const Q=[
 {text:"This recommender model achieves 94% click-through accuracy on the test set.",
  answer:"is",tag:"Descriptive (is)",tagclass:"tag-is",
  fb:"A purely descriptive claim: it reports a measurable fact about the system and contains no value or 'ought'. Facts like this can be settled empirically."},
 {text:"Personal data of vulnerable users ought to be given special protection.",
  answer:"ought",tag:"Normative (ought)",tagclass:"tag-ought",
  fb:"A normative claim: it prescribes what should be the case rather than describing what is. It rests on a value (protection of the vulnerable) and cannot be verified by measurement alone."},
 {text:"The model is more accurate than human judges, so we should let it decide alone.",
  answer:"fallacy",tag:"Is/ought leap",tagclass:"tag-fallacy",
  fb:"A naturalistic fallacy: accuracy is a fact (is), 'we should let it decide' is an 'ought'. The missing premise, that we ought to maximise accuracy even at the cost of contestability, is smuggled in and is exactly the ethical claim that deserves scrutiny."},
 {text:"Everyone already shares their data online, therefore it is fine for us to scrape it for training.",
  answer:"fallacy",tag:"Is/ought leap",tagclass:"tag-fallacy",
  fb:"A naturalistic fallacy: widespread behaviour (is) is treated as a licence (ought). What people in fact do does not, by logic alone, establish what is permissible; the carrying value premise is left unstated."},
 {text:"Developers must never treat a user merely as a means to a business goal.",
  answer:"ought",tag:"Normative (ought)",tagclass:"tag-ought",
  fb:"A normative claim, echoing the humanity formula of the categorical imperative. It states a duty and openly carries its value; it is not disguised as a fact."},
 {text:"The chatbot generated 4,000 responses in the pilot without a reported outage.",
  answer:"is",tag:"Descriptive (is)",tagclass:"tag-is",
  fb:"A descriptive report of what happened. Reliability data is a fact; on its own it says nothing about whether deploying the chatbot is right."},
 {text:"This behaviour evolved through natural selection, so acting on it must be morally right.",
  answer:"fallacy",tag:"Is/ought leap",tagclass:"tag-fallacy",
  fb:"A naturalistic fallacy in its evolutionary form: that a disposition evolved (is) does not entail that acting on it is right (ought). The origin of a trait carries no normative force by itself."},
 {text:"An AI system that shapes what millions read should be subject to public oversight.",
  answer:"ought",tag:"Normative (ought)",tagclass:"tag-ought",
  fb:"A normative claim: it prescribes a requirement (oversight) grounded in a value (accountability of powerful systems). It is stated as an 'ought', not passed off as a mere fact."}
];
let order=shuffle([...Q.keys()]),idx=0,score=0,answered=false;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
const btns={is:document.getElementById('b-is'),ought:document.getElementById('b-ought'),fallacy:document.getElementById('b-fallacy')};
const elStatement=document.getElementById('statement');
const elFeedback=document.getElementById('feedback');
const elNext=document.getElementById('next');
const elProgress=document.getElementById('progress');
const elScore=document.getElementById('score');
Object.entries(btns).forEach(([k,b])=>b.onclick=()=>choose(k));
elNext.onclick=()=>{idx++;idx<order.length?render():finish();};
function render(){
 answered=false;
 const q=Q[order[idx]];
 elStatement.textContent='"'+q.text+'"';
 elProgress.textContent='Statement '+(idx+1)+' of '+order.length;
 elScore.textContent='Score: '+score+' / '+order.length;
 Object.values(btns).forEach(b=>{b.disabled=false;b.className='';});
 elFeedback.className='feedback';
 elFeedback.innerHTML='';
 elNext.disabled=true;
}
function choose(pick){
 if(answered)return;
 answered=true;
 const q=Q[order[idx]];
 const ok=pick===q.answer;
 if(ok)score++;
 Object.values(btns).forEach(b=>b.disabled=true);
 btns[q.answer].classList.add('correct');
 if(!ok)btns[pick].classList.add('wrong');
 elFeedback.innerHTML='<span class="tag '+q.tagclass+'">'+q.tag+'</span><br>'+
   (ok?'<strong>Correct.</strong> ':'<strong>Not quite.</strong> ')+q.fb+
   '<br><span class="hume">Hume\'s law: no set of purely descriptive premises entails a normative conclusion.</span>';
 elFeedback.classList.add('show');
 elScore.textContent='Score: '+score+' / '+order.length;
 elNext.disabled=false;
 elNext.textContent=idx+1<order.length?'Next statement':'See result';
}
function finish(){
 document.querySelector('.card').innerHTML='<div class="done"><strong>You scored '+score+' out of '+order.length+'.</strong><br>'+
   'The habit to build: whenever an argument moves to what we should do, name the value or rule that carries the "ought" out loud, rather than smuggling it in under cover of a fact.'+
   '<div class="again"><button class="next" onclick="location.reload()">Try again</button></div></div>';
 document.querySelector('.nav').style.display='none';
}
render();
</script>
<script>
(function () {
  var lastH = 0;
  function reportHeight() {
    var h = document.body.scrollHeight;
    if (h === lastH) return;
    lastH = h;
    window.parent.postMessage({ iframeHeight: h }, '*');
  }
  window.addEventListener('load', function() { setTimeout(reportHeight, 100); });
  if (window.ResizeObserver) {
    new ResizeObserver(reportHeight).observe(document.body);
  }
  if (window.MutationObserver) {
    new MutationObserver(function() { setTimeout(reportHeight, 400); })
      .observe(document.body, { attributes: true, childList: true, subtree: true,
                                attributeFilter: ['class', 'style'] });
  }
})();
</script>
</body>
</html>
